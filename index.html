<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday, My Love!🌸❤️</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            background: #ffffff;
            color: #1e3a8a;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            user-select: none;
        }

        /* CONTAINER UTAMA HP MOCKUP */
        .phone-area {
            position: relative;
            width: 100%;
            max-width: 415px;
            height: 100vh;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 40px 24px;
            overflow-y: auto;
            overflow-x: hidden;
        }

        /* ELEMEN GLOBAL: KANTONG AUDIO BULAT DI POJOK ATAS */
        .global-audio-btn {
            position: absolute;
            top: 25px; right: 25px;
            width: 40px; height: 40px;
            border-radius: 50%;
            border: 1.5px solid #1e3a8a;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; z-index: 999;
            background: #ffffff;
            font-size: 16px;
            transition: transform 0.3s ease;
        }
        .global-audio-btn.playing {
            animation: spin 4s linear infinite;
        }

        /* SISTEM SCREEN DENGAN TRANSISI HALUS */
        .screen-layer {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
            opacity: 0;
            transform: scale(0.96);
            transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1), transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .screen-layer.active {
            display: flex;
            opacity: 1;
            transform: scale(1);
        }

        .mascot-avatar { font-size: 85px; margin-bottom: 15px; animation: bounce 2s infinite alternate; }
        .scr-title { font-size: 16px; font-weight: 600; color: #1e3a8a; text-align: center; margin-bottom: 20px; }
        
        .dots-container { display: flex; gap: 12px; margin-bottom: 35px; }
        .dot { width: 14px; height: 14px; border: 2px solid #1e3a8a; border-radius: 50%; transition: background 0.2s, transform 0.2s; }
        .dot.active { background: #1e3a8a; transform: scale(1.15); }

        .keypad-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px 25px;
            width: 100%; max-width: 290px;
        }
        .key-btn {
            background: #f8fafc; border: none; border-radius: 16px;
            height: 60px; font-size: 24px; font-weight: 700; color: #1e3a8a;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; transition: background 0.2s, transform 0.1s;
            box-shadow: 0 4px 10px rgba(30,58,138,0.04);
        }
        .key-btn:active { background: #e2e8f0; transform: scale(0.95); }
        .clue-text { font-size: 12px; color: #94a3b8; margin-top: 35px; font-style: italic; }

        .btn-action {
            background: #1e3a8a; color: #ffffff; border: none; padding: 12px 45px;
            font-size: 14px; font-weight: 600; border-radius: 25px; cursor: pointer;
            margin-top: 20px; box-shadow: 0 5px 15px rgba(30,58,138,0.2);
            transition: transform 0.2s, background 0.2s;
        }
        .btn-action:active { transform: scale(0.96); }
        
        .choice-row { display: flex; gap: 15px; margin-top: 25px; width: 100%; justify-content: center; }
        .btn-yes { background: #1e3a8a; color: white; border: none; padding: 10px 35px; border-radius: 20px; font-weight: 600; cursor: pointer; transition: transform 0.2s; }
        .btn-no { background: #f1f5f9; color: #64748b; border: none; padding: 10px 35px; border-radius: 20px; font-weight: 600; cursor: pointer; transition: transform 0.2s; }
        .btn-yes:active, .btn-no:active { transform: scale(0.95); }

        /* SPOTIFY STYLE */
        .spot-card {
            background: #6b21a8; width: 100%; border-radius: 24px; padding: 25px;
            color: #ffffff; position: relative; margin-top: 20px;
            box-shadow: 0 15px 35px rgba(107,33,168,0.25);
        }
        .spot-header { display: flex; flex-direction: column; align-items: center; text-align: center; }
        .spot-logo { position: absolute; top: 20px; right: 25px; font-size: 24px; opacity: 0.9; }
        .spot-cover { width: 110px; height: 110px; background: #fff; border-radius: 20px; margin-bottom: 15px; display: flex; justify-content: center; align-items: center; font-size: 55px; }
        
        .spot-controls { display: flex; justify-content: center; align-items: center; gap: 25px; margin: 20px 0; font-size: 22px; }
        .spot-play-trigger { font-size: 40px; cursor: pointer; transition: transform 0.2s; }
        .spot-play-trigger:active { transform: scale(0.9); }
        
        .track-list { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; }
        .track-item { 
            display: flex; justify-content: space-between; align-items: center; 
            font-size: 13px; opacity: 0.5; padding: 10px; border-radius: 12px;
            cursor: pointer; transition: background 0.2s, opacity 0.2s;
        }
        .track-item:hover { background: rgba(255,255,255,0.08); opacity: 0.8; }
        .track-item.active { opacity: 1; font-weight: bold; background: rgba(255,255,255,0.15); color: #f472b6; }
        .track-info { display: flex; gap: 12px; }

        /* SCREEN SURAT & HUJAN ELEMEN */
        .floating-elements { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 2; }
        .heart-star-particle { position: absolute; animation: fallDown var(--d) linear infinite; font-size: var(--s); opacity: 0.8; }
        
        .photo-main-box {
            width: 100%; height: 260px; border-radius: 20px;
            overflow: hidden; position: relative; margin-bottom: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15); z-index: 5;
            background: #f1f5f9;
            transition: opacity 0.5s ease;
        }
        .photo-main-box img { width: 100%; height: 100%; object-fit: cover; }

        .letter-scroll-wrap {
            width: 100%; background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px); border-radius: 20px; padding: 25px;
            box-shadow: 0 10px 30px rgba(30,58,138,0.05); z-index: 5;
            max-height: 350px; overflow-y: auto; border: 1px solid rgba(30,58,138,0.08);
        }
        .typed-paragraph { font-size: 15px; line-height: 1.7; color: #1e3a8a; text-align: left; margin-bottom: 15px; font-weight: 500; min-height: 20px; }

        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-12px); } }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fallDown {
            0% { transform: translateY(-5vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translateY(105vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <audio id="main-music" src="fearless.mp3" loop></audio>

    <div class="phone-area">
        
        <div class="global-audio-btn" id="global-audio" onclick="toggleAudioTekan()">🎵</div>

        <div id="scr-password" class="screen-layer active
